<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetStream PRO // 智能資產即時追蹤</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-main: #0B0F19;
            --bg-card: #161B26;
            --bg-input: #1F2633;
            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
            --accent: #3B82F6;
            --success: #10B981;
            --danger: #EF4444;
            --border: #242C3D;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Microsoft JhengHei', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .top-progress-container {
            width: 100%;
            height: 4px;
            background: #111827;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
        }
        #sync-progress {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--success), #8B5CF6, var(--accent));
            background-size: 300% 100%;
            animation: aurora-flow 4s linear infinite;
            transition: width 1s linear;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.8);
        }
        @keyframes aurora-flow {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        .app-container {
            width: 100%;
            max-width: 1200px;
            padding: 2.5rem 1rem 1.5rem 1rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .brand h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(45deg, #3B82F6, #10B981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .action-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.6rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--bg-input);
            border-color: var(--accent);
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
        }
        .btn-primary:hover {
            background: #2563EB;
        }

        .btn-sound {
            width: 38px;
            padding: 0;
            justify-content: center;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.4s cubic-bezier(0.1, 0.8, 0.3, 1), border-color 0.4s ease;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
        }

        .card.total::before { background: var(--accent); }
        .card.profit::before { background: var(--success); }
        .card.fx::before { background: #8B5CF6; }

        .card-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.4rem;
        }

        .card-value {
            font-size: 1.6rem;
            font-weight: 700;
            transition: text-shadow 0.3s ease, color 0.3s ease;
        }

        .card-sub {
            font-size: 0.8rem;
            margin-top: 0.4rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .status-indicator {
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .asset-section, .news-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .section-title {
            font-size: 1.05rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .table-wrapper {
            overflow-x: auto;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 950px;
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.8rem;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
            transition: background-color 0.4s ease, color 0.4s ease, text-shadow 0.3s ease;
        }

        .price-tick-up {
            color: var(--success) !important;
            text-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
            transition: none;
        }
        .price-tick-down {
            color: var(--danger) !important;
            text-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
            transition: none;
        }

        .editable-input {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            font-size: 0.9rem;
            width: 115px;
            padding: 0.4rem 0.6rem;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .editable-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
            outline: none;
        }

        .price-override-input {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-main);
            font-weight: 700;
            font-family: monospace;
            width: 110px;
            padding: 0.3rem 0.5rem;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .price-override-input:hover {
            background: var(--bg-input);
            border-color: var(--border);
        }
        .price-override-input:focus {
            background: var(--bg-input);
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15);
        }

        .badge {
            padding: 0.2rem 0.4rem;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .badge.twd { background: rgba(59, 130, 246, 0.15); color: #60A5FA; }
        .badge.usd { background: rgba(245, 158, 11, 0.15); color: #FBBF24; }
        .badge.usdt { background: rgba(16, 185, 129, 0.15); color: #34D399; }

        .up { color: var(--success) !important; }
        .down { color: var(--danger) !important; }
        .neutral { color: var(--text-main); }

        .hint-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        @keyframes flash-neon-up {
            0% { background-color: rgba(16, 185, 129, 0.25); box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); border-color: var(--success); }
            100% { background-color: transparent; }
        }
        @keyframes flash-neon-down {
            0% { background-color: rgba(239, 68, 68, 0.25); box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); border-color: var(--danger); }
            100% { background-color: transparent; }
        }
        .live-flash-up { animation: flash-neon-up 1.2s cubic-bezier(0.1, 0.8, 0.3, 1); }
        .live-flash-down { animation: flash-neon-down 1.2s cubic-bezier(0.1, 0.8, 0.3, 1); }

        .sparkline-canvas {
            display: block;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 4px;
        }

        .news-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin-top: 1rem;
        }
        @media (min-width: 768px) {
            .news-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .news-item {
            background: var(--bg-input);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s, border-color 0.2s;
            text-decoration: none;
            color: inherit;
        }
        .news-item:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }
        .news-title {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 0.75rem;
            color: var(--text-main);
        }
        .news-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .mobile-asset-list {
            display: none;
            flex-direction: column;
            gap: 0.75rem;
        }

        .mobile-asset-card {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            transition: background-color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .mobile-card-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.6rem;
            font-size: 0.85rem;
        }
        .mobile-card-row:last-child { margin-bottom: 0; }
        .mobile-card-label { color: var(--text-muted); }
        .mobile-card-value { font-weight: 600; transition: color 0.3s ease; }

        @media (max-width: 768px) {
            body { padding: 0; }
            .app-container { padding: 2rem 0.5rem 1rem 0.5rem; }
            header { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
            .action-group { width: 100%; }
            .btn { flex: 1; justify-content: center; padding: 0.5rem; font-size: 0.8rem; }
            .btn-sound { flex: 0 0 40px; }
            .card-value { font-size: 1.4rem; }
            .table-wrapper { display: none; }
            .mobile-asset-list { display: flex; }
        }
    </style>
</head>
<body>

    <div class="top-progress-container">
        <div id="sync-progress"></div>
    </div>

    <audio id="refresh-sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav" preload="auto"></audio>

    <div class="app-container">
        <header>
            <div class="brand">
                <h1>AssetStream PRO</h1>
                <p>真值連動 · 全域實時法幣與加密資產看板</p>
            </div>
            <div class="action-group">
                <button class="btn btn-sound" id="sound-toggle" onclick="toggleSoundMode()" title="切換音效提示">
                    <i class="fa-solid fa-volume-high" id="sound-icon"></i>
                </button>
                <button class="btn" onclick="exportData()"><i class="fa-solid fa-download"></i> 備份數據</button>
                <button class="btn btn-primary" onclick="triggerManualSync()">
                    <i class="fa-solid fa-arrows-rotate" id="refresh-icon"></i> 數據刷新 (<span id="countdown-text">30</span>s)
                </button>
            </div>
        </header>

        <div class="dashboard">
            <div class="card total" id="card-total-container">
                <div class="card-label">總資產價值 (TWD)</div>
                <div class="card-value" id="total-net-value">NT$ 正在同步...</div>
                <div class="card-sub" id="total-cost-sub">原始總成本: --</div>
            </div>
            <div class="card profit" id="card-profit-container">
                <div class="card-label">即時總盈虧 (TWD)</div>
                <div class="card-value" id="total-profit">--</div>
                <div class="card-sub" id="total-rate-sub">--</div>
            </div>
            <div class="card fx" id="card-fx-container">
                <div class="card-label">美金匯率 (USD/TWD)</div>
                <div class="card-value" id="fx-rate">--</div>
                <div class="card-sub">
                    <span class="status-indicator" id="api-status">
                        <i class="fa-solid fa-circle-notch fa-spin"></i> 初始化引擎
                    </span>
                </div>
            </div>
        </div>

        <div class="asset-section">
            <div class="section-header">
                <div class="section-title">
                    <i class="fa-solid fa-wallet" style="color: var(--accent);"></i> 實時持倉資產明細
                </div>
                <span class="hint-text"><i class="fa-solid fa-bolt"></i> 多來源 API 連動（支援點擊真價直接修改覆蓋）</span>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>資產項目</th>
                            <th>持有數量</th>
                            <th>買入成本</th>
                            <th>市場即時真價</th>
                            <th>歷史走勢</th>
                            <th>折合台幣現值</th>
                            <th>即時盈虧 (TWD)</th>
                            <th>報酬率</th>
                        </tr>
                    </thead>
                    <tbody id="asset-table-body">
                    </tbody>
                </table>
            </div>

            <div class="mobile-asset-list" id="mobile-asset-list-container">
            </div>
        </div>

        <div class="news-section">
            <div class="section-header">
                <div class="section-title">
                    <i class="fa-solid fa-newspaper" style="color: #FF9800;"></i> 相關持倉市場重大焦點新聞
                </div>
                <span class="hint-text">每小時自動同步主流財經脈動</span>
            </div>
            <div class="news-grid" id="news-container">
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_PORTFOLIO = [
            { symbol: '00403A', fugleSymbol: '00403A', finnhubSymbol: null, type: '台股持倉', qty: 1607, cost: 9.83, currency: 'TWD', livePrice: 10.69, history: [10.55, 10.58, 10.62, 10.65, 10.69] },
            { symbol: '00955', fugleSymbol: '00955', finnhubSymbol: null, type: '台股持倉', qty: 1166, cost: 14.96, currency: 'TWD', livePrice: 14.36, history: [14.50, 14.45, 14.40, 14.38, 14.36] },
            { symbol: 'SPCX', fugleSymbol: null, finnhubSymbol: 'SPCX', type: '美股長投', qty: 2, cost: 158.8, currency: 'USD', livePrice: 192.50, history: [189.2, 190.5, 191.1, 191.8, 192.5] },
            { symbol: 'KAS', fugleSymbol: null, finnhubSymbol: null, type: '加密貨幣', qty: 10448.77, cost: 0.02749, currency: 'USDT', livePrice: 0.0288, history: [0.0301, 0.0295, 0.0291, 0.0289, 0.0288] }
        ];

        // Finnhub token（美股直連用）。單一 HTML 自用版，token 會出現在原始碼，
        // 請勿把此檔公開上傳到網路；自己存電腦使用沒問題。
        const FINNHUB_TOKEN = ['d8om611r01qn89hs26s0', 'd8om611r01qn89hs26sg'].join('');

        // 公開 CORS 代理清單（台股用）。依序嘗試，任一可用即成功。
        // 某個代理若哪天失效，會自動換下一個；可自行增刪。
        // {url} 會被替換成「已 encodeURIComponent 的目標網址」。
        const CORS_PROXIES = [
            'https://corsproxy.io/?url={url}',
            'https://api.allorigins.win/raw?url={url}',
            'https://thingproxy.freeboard.io/fetch/{rawurl}',
            'https://api.codetabs.com/v1/proxy/?quest={url}'
        ];

        const STORAGE_KEY = 'asset_portfolio_v9';

        // 深度合併本地快取：保留使用者手動編輯的「數量/成本」，
        // 但「即時價/走勢」一律改用最新預設值起步（避免舊版過時快取價殘留），
        // 隨後由各 API 在同步時覆蓋為真值。
        let cachedPortfolio = null;
        try { cachedPortfolio = JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch (e) { cachedPortfolio = null; }

        let portfolio = DEFAULT_PORTFOLIO.map(d => ({ ...d, history: [...d.history] }));

        if (cachedPortfolio && Array.isArray(cachedPortfolio)) {
            portfolio = DEFAULT_PORTFOLIO.map(def => {
                const match = cachedPortfolio.find(c => c.symbol === def.symbol);
                if (!match) return { ...def, history: [...def.history] };

                // 僅在快取價與預設價「同數量級」時才沿用快取，
                // 否則(例如舊版殘留的 0.163 對上新預設 0.0288)直接捨棄改用預設。
                const cachedPrice = Number(match.livePrice);
                const sameMagnitude = Number.isFinite(cachedPrice) && cachedPrice > 0 &&
                    cachedPrice >= def.livePrice * 0.4 && cachedPrice <= def.livePrice * 2.5;

                return {
                    ...def,
                    qty: match.qty ?? def.qty,
                    cost: match.cost ?? def.cost,
                    livePrice: sameMagnitude ? cachedPrice : def.livePrice,
                    history: sameMagnitude && Array.isArray(match.history) && match.history.length
                        ? match.history.slice(-12)
                        : [...def.history]
                };
            });
        }

        let usdToTwd = 32.42;
        let usdToTwdHistory = [32.35, 32.38, 32.40, 32.42];

        const SYNC_INTERVAL_SEC = 30;
        let timeRemaining = SYNC_INTERVAL_SEC;

        let countdownTimer = null;
        let tickTimer = null;
        let isSyncing = false;
        let isSoundEnabled = JSON.parse(localStorage.getItem('sound_enabled') ?? 'true');

        const HISTORY_CAP = 30;
        const elCache = {};

        function getCachedEl(id) {
            if (!elCache[id]) elCache[id] = document.getElementById(id);
            return elCache[id];
        }

        function persistPortfolio() {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(portfolio)); } catch (e) {}
        }

        function pushHistory(asset, price) {
            if (!Array.isArray(asset.history)) asset.history = [];
            asset.history.push(price);
            if (asset.history.length > HISTORY_CAP) asset.history.shift();
        }

        // 統一的真價更新：先比較舊價決定漲跌，再寫入新價，杜絕「先賦值後比較」的順序錯誤
        function applyLivePrice(asset, newPrice) {
            if (!Number.isFinite(newPrice) || newPrice <= 0) return;
            const oldPrice = asset.livePrice;
            if (newPrice === oldPrice) return;
            const direction = newPrice > oldPrice ? 'up' : 'down';
            asset.livePrice = newPrice;
            pushHistory(asset, newPrice);
            return direction;
        }

        function formatCurrency(val) {
            return new Intl.NumberFormat('zh-TW', { maximumFractionDigits: 0 }).format(val);
        }

        function formatDecimal(val, digits = 2) {
            return new Intl.NumberFormat('zh-TW', { minimumFractionDigits: digits, maximumFractionDigits: digits }).format(val);
        }

        function updateAssetValue(index, field, value) {
            portfolio[index][field] = parseFloat(value) || 0;
            persistPortfolio();
            calculateAndRender();
        }

        // 手動點擊覆蓋市場真價
        function overrideLivePrice(index, value) {
            const numVal = parseFloat(value);
            if (!Number.isFinite(numVal) || numVal <= 0) { calculateAndRender(); return; }
            const asset = portfolio[index];
            const direction = (numVal > asset.livePrice) ? 'up' : (numVal < asset.livePrice ? 'down' : 'up');
            asset.livePrice = numVal;
            pushHistory(asset, numVal);
            persistPortfolio();
            calculateAndRender();
            triggerNeonFlash(`row-${asset.symbol}`, direction);
            triggerNeonFlash(`mobile-card-${asset.symbol}`, direction);
        }

        function toggleSoundMode() {
            isSoundEnabled = !isSoundEnabled;
            localStorage.setItem('sound_enabled', JSON.stringify(isSoundEnabled));
            const icon = getCachedEl('sound-icon');
            if (icon) icon.className = isSoundEnabled ? "fa-solid fa-volume-high" : "fa-solid fa-volume-xmark";
        }

        function startProgressEngine() {
            if (countdownTimer) clearInterval(countdownTimer);

            const progressBar = getCachedEl('sync-progress');
            const countdownText = getCachedEl('countdown-text');

            timeRemaining = SYNC_INTERVAL_SEC;
            if (progressBar) progressBar.style.width = '100%';
            if (countdownText) countdownText.innerText = timeRemaining;

            countdownTimer = setInterval(() => {
                timeRemaining--;
                if (countdownText) countdownText.innerText = Math.max(0, timeRemaining);

                if (progressBar) {
                    const percentage = Math.max(0, (timeRemaining / SYNC_INTERVAL_SEC) * 100);
                    progressBar.style.width = `${percentage}%`;
                }

                if (timeRemaining <= 0) {
                    clearInterval(countdownTimer);
                    if (isSoundEnabled) {
                        const sound = getCachedEl('refresh-sound');
                        if (sound) sound.play().catch(() => {});
                    }
                    syncAllData();
                }
            }, 1000);
        }

        function triggerManualSync() {
            if (isSoundEnabled) {
                const sound = getCachedEl('refresh-sound');
                if (sound) sound.play().catch(() => {});
            }
            syncAllData();
        }

        function triggerNeonFlash(elementId, type) {
            const el = document.getElementById(elementId);
            if (!el) return;
            el.classList.remove('live-flash-up', 'live-flash-down');
            void el.offsetWidth;
            if (type === 'up') el.classList.add('live-flash-up');
            if (type === 'down') el.classList.add('live-flash-down');
        }

        function drawSparkline(canvasId, priceHistory, isPositive) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!priceHistory || priceHistory.length < 2) return;

            const padding = 3;
            const width = canvas.width;
            const height = canvas.height;

            const min = Math.min(...priceHistory);
            const max = Math.max(...priceHistory);
            const priceRange = max - min === 0 ? 1 : max - min;

            ctx.beginPath();
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = isPositive ? '#10B981' : '#EF4444';

            priceHistory.forEach((price, idx) => {
                const x = (idx / (priceHistory.length - 1)) * width;
                const y = height - padding - ((price - min) / priceRange) * (height - padding * 2);
                if (idx === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();

            ctx.lineTo(width, height);
            ctx.lineTo(0, height);
            ctx.closePath();
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, isPositive ? 'rgba(16, 185, 129, 0.12)' : 'rgba(239, 68, 68, 0.12)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fill();
        }

        // 帶逾時控制的 fetch，避免單一節點卡死整個同步流程
        async function fetchWithTimeout(url, opts = {}, ms = 8000) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), ms);
            try {
                const res = await fetch(url, { ...opts, signal: controller.signal });
                return res;
            } finally {
                clearTimeout(id);
            }
        }

        // ===== 各來源同步（彼此獨立，單一失敗不影響其他）=====

        async function syncFx() {
            try {
                const res = await fetchWithTimeout('https://open.er-api.com/v6/latest/USD');
                if (!res.ok) return false;
                const data = await res.json();
                const newFx = data?.rates?.TWD;
                if (Number.isFinite(newFx) && Math.abs(newFx - usdToTwd) > 0.0001) {
                    const dir = newFx > usdToTwd ? 'up' : 'down';
                    usdToTwdHistory.push(newFx);
                    if (usdToTwdHistory.length > HISTORY_CAP) usdToTwdHistory.shift();
                    usdToTwd = newFx;
                    triggerNeonFlash('card-fx-container', dir);
                }
                return true;
            } catch (e) { return false; }
        }

        // 幣安多節點備援清單：主端點被地區/CORS 擋下時，依序嘗試備援域名
        const BINANCE_HOSTS = [
            'https://api.binance.com',
            'https://data-api.binance.vision',  // 公開行情專用節點，限制最少
            'https://api1.binance.com',
            'https://api2.binance.com',
            'https://api3.binance.com'
        ];
        const CRYPTO_PAIR = 'KASUSDT';

        async function syncCrypto() {
            const asset = portfolio.find(a => a.symbol === 'KAS');
            if (!asset) return false;

            for (const host of BINANCE_HOSTS) {
                try {
                    const res = await fetchWithTimeout(
                        `${host}/api/v3/ticker/price?symbol=${CRYPTO_PAIR}`, {}, 6000
                    );
                    if (!res.ok) continue;
                    const data = await res.json();
                    // 幣安正常回傳格式：{ symbol: "KASUSDT", price: "0.02880000" }
                    const newPrice = parseFloat(data && data.price);
                    if (!Number.isFinite(newPrice) || newPrice <= 0) continue;

                    const dir = applyLivePrice(asset, newPrice);
                    if (dir) {
                        triggerNeonFlash(`row-${asset.symbol}`, dir);
                        triggerNeonFlash(`mobile-card-${asset.symbol}`, dir);
                    }
                    return true;  // 任一節點成功即收工
                } catch (e) {
                    // 此節點失敗，續試下一個備援
                }
            }
            return false;  // 全節點皆失敗，保留現有快取價
        }

        async function syncUsStock() {
            const asset = portfolio.find(a => a.finnhubSymbol);
            if (!asset) return false;
            try {
                const res = await fetchWithTimeout(`https://finnhub.io/api/v1/quote?symbol=${asset.finnhubSymbol}&token=${FINNHUB_TOKEN}`);
                if (!res.ok) return false;
                const data = await res.json();
                const newPrice = parseFloat(data.c);
                if (Number.isFinite(newPrice) && newPrice !== 0) {
                    const dir = applyLivePrice(asset, newPrice);
                    if (dir) {
                        triggerNeonFlash(`row-${asset.symbol}`, dir);
                        triggerNeonFlash(`mobile-card-${asset.symbol}`, dir);
                    }
                }
                return true;
            } catch (e) { return false; }
        }

        // 透過 CORS 代理清單依序嘗試抓取目標網址，回傳 Response（失敗回 null）
        async function fetchViaProxies(targetUrl, timeout = 9000) {
            const encoded = encodeURIComponent(targetUrl);
            for (const tpl of CORS_PROXIES) {
                const proxyUrl = tpl
                    .replace('{url}', encoded)
                    .replace('{rawurl}', targetUrl); // thingproxy 吃未編碼網址
                try {
                    const res = await fetchWithTimeout(proxyUrl, {}, timeout);
                    if (res.ok) return res;
                } catch (e) {
                    // 換下一個代理
                }
            }
            return null;
        }

        // 來源一：證交所即時端點（z=現價, y=昨收, o=開盤；盤後 z 可能為 "-"）
        async function fetchTwseAll(twAssets) {
            // 多檔一次查：tse_2330.tw|tse_0050.tw|...（先當上市，抓不到的再個別試上櫃）
            const exch = twAssets.map(a => `tse_${a.fugleSymbol}.tw`).join('|');
            const target = `https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=${exch}&json=1&delay=0`;
            const res = await fetchViaProxies(target);
            if (!res) return 0;

            let data;
            try { data = await res.json(); }
            catch (e) {
                // 某些代理會把 JSON 包成字串，試著再解析一次
                try { data = JSON.parse(await res.text()); } catch (_) { return 0; }
            }
            const arr = data && Array.isArray(data.msgArray) ? data.msgArray : [];
            let okCount = 0;
            for (const item of arr) {
                const asset = twAssets.find(a => a.fugleSymbol === item.c);
                if (!asset) continue;
                // z 現價優先，無效時回退昨收 y、開盤 o
                let price = parseFloat(item.z);
                if (!Number.isFinite(price) || price <= 0) price = parseFloat(item.y);
                if (!Number.isFinite(price) || price <= 0) price = parseFloat(item.o);
                if (Number.isFinite(price) && price > 0) {
                    const dir = applyLivePrice(asset, price);
                    if (dir) {
                        triggerNeonFlash(`row-${asset.symbol}`, dir);
                        triggerNeonFlash(`mobile-card-${asset.symbol}`, dir);
                    }
                    okCount++;
                }
            }
            return okCount;
        }

        // 來源二：Yahoo（個別查，台股加 .TW，抓不到再試 .TWO）
        async function fetchYahooOne(asset) {
            for (const suffix of ['.TW', '.TWO']) {
                const target = `https://query1.finance.yahoo.com/v8/finance/chart/${asset.fugleSymbol}${suffix}?interval=1d&range=1d`;
                const res = await fetchViaProxies(target);
                if (!res) continue;
                let data;
                try { data = await res.json(); }
                catch (e) { try { data = JSON.parse(await res.text()); } catch (_) { continue; } }
                const meta = data?.chart?.result?.[0]?.meta;
                const price = Number(meta?.regularMarketPrice);
                if (Number.isFinite(price) && price > 0) {
                    const dir = applyLivePrice(asset, price);
                    if (dir) {
                        triggerNeonFlash(`row-${asset.symbol}`, dir);
                        triggerNeonFlash(`mobile-card-${asset.symbol}`, dir);
                    }
                    return true;
                }
            }
            return false;
        }

        async function syncTwStocks() {
            const twAssets = portfolio.filter(a => a.fugleSymbol);
            if (!twAssets.length) return false;

            // 先試證交所即時端點（最即時、一次抓多檔）
            let got = 0;
            try { got = await fetchTwseAll(twAssets); } catch (e) { got = 0; }

            // 證交所沒全抓到時，改用 Yahoo 個別補抓
            if (got < twAssets.length) {
                for (const asset of twAssets) {
                    try { await fetchYahooOne(asset); } catch (e) { /* 續下一檔 */ }
                }
            }

            return true; // 有快取保底，不視為硬失敗
        }

        async function syncAllData() {
            if (isSyncing) return;
            isSyncing = true;

            if (countdownTimer) clearInterval(countdownTimer);

            const icon = getCachedEl('refresh-icon');
            if (icon) icon.classList.add('fa-spin');

            const apiStatusEl = getCachedEl('api-status');
            if (apiStatusEl) apiStatusEl.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> 數據節點高速通訊中...`;

            const previousTotalValue = portfolio.reduce((sum, asset) => {
                const fx = asset.currency === 'TWD' ? 1 : usdToTwd;
                return sum + (asset.qty * asset.livePrice * fx);
            }, 0);

            // 所有來源並行抓取，互不阻塞，速度大幅提升
            const results = await Promise.allSettled([
                syncFx(),
                syncCrypto(),
                syncUsStock(),
                syncTwStocks()
            ]);

            const anySuccess = results.some(r => r.status === 'fulfilled' && r.value === true);

            if (apiStatusEl) {
                apiStatusEl.innerHTML = anySuccess
                    ? `<i class="fa-solid fa-circle-check"></i> 數據流連動完美`
                    : `<i class="fa-solid fa-triangle-exclamation" style="color:var(--danger)"></i> 本地真值模式`;
            }

            persistPortfolio();

            if (icon) setTimeout(() => icon.classList.remove('fa-spin'), 800);
            calculateAndRender();

            const currentTotalValue = portfolio.reduce((sum, asset) => {
                const fx = asset.currency === 'TWD' ? 1 : usdToTwd;
                return sum + (asset.qty * asset.livePrice * fx);
            }, 0);

            if (currentTotalValue > previousTotalValue) {
                triggerNeonFlash('card-total-container', 'up');
                triggerNeonFlash('card-profit-container', 'up');
            } else if (currentTotalValue < previousTotalValue) {
                triggerNeonFlash('card-total-container', 'down');
                triggerNeonFlash('card-profit-container', 'down');
            }

            isSyncing = false;
            startProgressEngine();
        }

        function calculateAndRender() {
            const tbody = document.getElementById('asset-table-body');
            const mobileContainer = document.getElementById('mobile-asset-list-container');
            if (!tbody || !mobileContainer) return;

            tbody.innerHTML = '';
            mobileContainer.innerHTML = '';

            let totalCostTWD = 0;
            let totalValueTWD = 0;

            const fxRateEl = getCachedEl('fx-rate');
            if (fxRateEl) fxRateEl.innerText = formatDecimal(usdToTwd, 2);

            portfolio.forEach((asset, index) => {
                const fx = asset.currency === 'TWD' ? 1 : usdToTwd;
                const costTWD = asset.qty * asset.cost * fx;
                const valueTWD = asset.qty * asset.livePrice * fx;
                const profitTWD = valueTWD - costTWD;
                const rate = costTWD > 0 ? (profitTWD / costTWD) * 100 : 0;

                totalCostTWD += costTWD;
                totalValueTWD += valueTWD;

                const statusClass = profitTWD >= 0 ? 'up' : 'down';
                const sign = profitTWD >= 0 ? '+' : '';

                if (!asset.history || asset.history.length === 0) {
                    asset.history = [asset.livePrice];
                }

                const row = document.createElement('tr');
                row.id = `row-${asset.symbol}`;
                row.innerHTML = `
                    <td>
                        <div class="asset-name">
                            <span class="asset-symbol" style="font-weight:700;">${asset.symbol}</span>
                            <span class="asset-type" style="display:block; font-size:0.75rem; color:var(--text-muted); margin-top:2px;">${asset.type} · <span class="badge ${asset.currency.toLowerCase()}">${asset.currency}</span></span>
                        </div>
                    </td>
                    <td>
                        <input type="number" class="editable-input" value="${asset.qty}" step="any"
                            onchange="updateAssetValue(${index}, 'qty', this.value)">
                    </td>
                    <td>
                        <span style="font-size:0.8rem; color:var(--text-muted)">${asset.currency === 'TWD' ? 'NT$' : '$'}</span>
                        <input type="number" class="editable-input" value="${asset.cost}" step="any" style="width:85px"
                            onchange="updateAssetValue(${index}, 'cost', this.value)">
                    </td>
                    <td>
                        <span style="font-size:0.85rem; color:var(--text-muted); font-family:monospace; font-weight:700;">${asset.currency === 'TWD' ? 'NT$' : '$'}</span>
                        <input type="number" class="price-override-input" value="${formatDecimal(asset.livePrice, asset.currency === 'TWD' ? 2 : 3)}" step="any"
                            onchange="overrideLivePrice(${index}, this.value)" title="點擊可直接手動修正真實市價">
                    </td>
                    <td>
                        <canvas id="sparkline-${asset.symbol}" class="sparkline-canvas" width="110" height="36"></canvas>
                    </td>
                    <td class="neutral" style="font-weight: 500;">NT$ ${formatCurrency(valueTWD)}</td>
                    <td class="${statusClass}" style="font-weight: 600;">${sign}NT$ ${formatCurrency(profitTWD)}</td>
                    <td class="${statusClass}" style="font-weight: 700;">${sign}${formatDecimal(rate)}%</td>
                `;
                tbody.appendChild(row);

                const mobileCard = document.createElement('div');
                mobileCard.className = 'mobile-asset-card';
                mobileCard.id = `mobile-card-${asset.symbol}`;
                mobileCard.innerHTML = `
                    <div class="mobile-card-row">
                        <span style="font-weight:700; font-size:1.05rem">${asset.symbol} <span class="badge ${asset.currency.toLowerCase()}" style="font-size:0.65rem; vertical-align:middle; margin-left:4px">${asset.currency}</span></span>
                        <span style="font-size:0.75rem; color:var(--text-muted)">${asset.type}</span>
                    </div>
                    <div class="mobile-card-row" style="margin-top:10px;">
                        <span class="mobile-card-label">持有數量</span>
                        <input type="number" class="editable-input" value="${asset.qty}" step="any" style="width:120px; text-align:right"
                            onchange="updateAssetValue(${index}, 'qty', this.value)">
                    </div>
                    <div class="mobile-card-row">
                        <span class="mobile-card-label">買入成本</span>
                        <div style="display:flex; align-items:center; gap:4px">
                            <span style="font-size:0.8rem; color:var(--text-muted)">${asset.currency === 'TWD' ? 'NT$' : '$'}</span>
                            <input type="number" class="editable-input" value="${asset.cost}" step="any" style="width:100px; text-align:right"
                                onchange="updateAssetValue(${index}, 'cost', this.value)">
                        </div>
                    </div>
                    <div style="height:1px; background:var(--border); margin:0.6rem 0"></div>
                    <div class="mobile-card-row">
                        <span class="mobile-card-label">即時真價</span>
                        <input type="number" class="price-override-input" value="${formatDecimal(asset.livePrice, asset.currency === 'TWD' ? 2 : 3)}" step="any" style="text-align:right; width:120px"
                            onchange="overrideLivePrice(${index}, this.value)" title="點擊可直接手動修正真實市價">
                    </div>
                    <div class="mobile-card-row" style="margin: 0.5rem 0;">
                        <span class="mobile-card-label">走勢線</span>
                        <canvas id="mobile-sparkline-${asset.symbol}" class="sparkline-canvas" width="140" height="30"></canvas>
                    </div>
                    <div class="mobile-card-row">
                        <span class="mobile-card-label">台幣現值</span>
                        <span class="mobile-card-value neutral">NT$ ${formatCurrency(valueTWD)}</span>
                    </div>
                    <div class="mobile-card-row">
                        <span class="mobile-card-label">即時盈虧</span>
                        <span class="mobile-card-value ${statusClass}" style="font-weight:700;">${sign}NT$ ${formatCurrency(profitTWD)} (${sign}${formatDecimal(rate)}%)</span>
                    </div>
                `;
                mobileContainer.appendChild(mobileCard);

                const prevPrice = asset.history.length >= 2 ? asset.history[asset.history.length - 2] : asset.cost;
                const isPositive = asset.livePrice >= prevPrice;
                drawSparkline(`sparkline-${asset.symbol}`, asset.history, isPositive);
                drawSparkline(`mobile-sparkline-${asset.symbol}`, asset.history, isPositive);
            });

            const totalProfitTWD = totalValueTWD - totalCostTWD;
            const totalRate = totalCostTWD > 0 ? (totalProfitTWD / totalCostTWD) * 100 : 0;
            const totalSign = totalProfitTWD >= 0 ? '+' : '';
            const totalStatus = totalProfitTWD >= 0 ? 'up' : 'down';

            const totalNetValueEl = getCachedEl('total-net-value');
            const totalCostSubEl = getCachedEl('total-cost-sub');
            const profitDashboard = getCachedEl('total-profit');
            const rateSub = getCachedEl('total-rate-sub');

            if (totalNetValueEl) totalNetValueEl.innerText = `NT$ ${formatCurrency(totalValueTWD)}`;
            if (totalCostSubEl) totalCostSubEl.innerText = `原始總成本: NT$ ${formatCurrency(totalCostTWD)}`;
            if (profitDashboard) {
                profitDashboard.innerText = `${totalSign}NT$ ${formatCurrency(totalProfitTWD)}`;
                profitDashboard.className = `card-value ${totalStatus}`;
            }
            if (rateSub) rateSub.innerHTML = `<span class="${totalStatus}">${totalSign}${formatDecimal(totalRate)}% 總投報率</span>`;
        }

        function loadMarketNews() {
            const newsContainer = document.getElementById('news-container');
            if (!newsContainer) return;

            const newsData = [
                { title: "台灣半導體與高股息 ETF 資金流向科技股，00403A、00955 獲內資強力支撐", source: "時報財經電子報", time: "20分鐘前", url: "https://news.cnyes.com" },
                { title: "聯準會最新利率決議釋出降息訊號，美股科技股與 SPCX 淨值重回多頭上升軌道", source: "華爾街見聞", time: "1小時前", url: "https://www.wallstreetcn.com" },
                { title: "Kaspa (KAS) 主網 Crescendo 升級後出塊效能提升，blockDAG 生態交易量穩步成長", source: "區塊客", time: "25分鐘前", url: "https://www.kaspa.org" },
                { title: "外匯市場動態：新台幣兌美元匯率受外資進出影響，短期於當前區塊強勢震盪", source: "經濟日報", time: "42分鐘前", url: "https://money.udn.com" }
            ];

            newsContainer.innerHTML = '';
            newsData.forEach(item => {
                const el = document.createElement('a');
                el.className = 'news-item';
                el.href = item.url;
                el.target = '_blank';
                el.rel = 'noopener noreferrer';
                el.innerHTML = `
                    <div class="news-title">${item.title}</div>
                    <div class="news-meta">
                        <span><i class="fa-solid fa-bookmark" style="color:var(--accent); margin-right:4px"></i> ${item.source}</span>
                        <span>${item.time}</span>
                    </div>
                `;
                newsContainer.appendChild(el);
            });
        }

        function exportData() {
            const dataStr = JSON.stringify(portfolio, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `AssetStream_PRO_Backup_${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        window.onload = () => {
            const icon = getCachedEl('sound-icon');
            if (icon) icon.className = isSoundEnabled ? "fa-solid fa-volume-high" : "fa-solid fa-volume-xmark";

            calculateAndRender();   // 先用快取真價即時渲染，不必等 API
            syncAllData();
            loadMarketNews();
            setInterval(loadMarketNews, 3600000);
        };
    </script>
