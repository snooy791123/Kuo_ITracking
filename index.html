<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetStream PRO // 智能資產即時追蹤 x TradingView</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #0B0F19;
            --bg-card: #161B26;
            --bg-input: #1F2633;
            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
            --accent: #3B82F6;
            --success: #10B981;
            --danger: #EF4444;
            --border: #242C3D;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Microsoft JhengHei', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 1200px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .brand h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(45deg, #3B82F6, #10B981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .action-group {
            display: flex;
            gap: 0.75rem;
        }

        .btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--bg-input);
            border-color: var(--accent);
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
        }
        .btn-primary:hover {
            background: #2563EB;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
        }

        .card.total::before { background: var(--accent); }
        .card.profit::before { background: var(--success); }
        .card.fx::before { background: #8B5CF6; }

        .card-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .card-value {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .card-sub {
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .status-indicator {
            font-size: 0.8rem;
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .asset-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            overflow-x: auto;
            margin-bottom: 2rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 850px;
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.85rem;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
        }

        td {
            padding: 1.2rem 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }

        .editable-input {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-main);
            font-size: 0.95rem;
            width: 110px;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .editable-input:focus, .editable-input:hover {
            background: var(--bg-input);
            border-color: var(--border);
            outline: none;
        }

        .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge.twd { background: rgba(59, 130, 246, 0.15); color: #60A5FA; }
        .badge.usd { background: rgba(245, 158, 11, 0.15); color: #FBBF24; }
        .badge.usdt { background: rgba(16, 185, 129, 0.15); color: #34D399; }

        .up { color: var(--success) !important; }
        .down { color: var(--danger) !important; }
        .neutral { color: var(--text-main); }

        .hint-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        /* TradingView 區塊樣式 */
        .tradingview-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .tv-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 900px) {
            .tv-grid {
                grid-template-columns: 2fr 1fr;
            }
        }

        .tv-container {
            height: 500px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        @media (max-width: 768px) {
            body { padding: 1rem 0.5rem; }
            header { flex-direction: column; align-items: flex-start; }
            .action-group { width: 100%; }
            .btn { flex: 1; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="brand">
                <h1>AssetStream PRO</h1>
                <p>已整合 TradingView 實時多源價格追蹤系統</p>
            </div>
            <div class="action-group">
                <button class="btn" onclick="exportData()"><i class="fa-solid fa-download"></i> 備份數據</button>
                <button class="btn btn-primary" onclick="initAssetData()">
                    <i class="fa-solid fa-arrows-rotate" id="refresh-icon"></i> 同步數據計算
                </button>
            </div>
        </header>

        <div class="dashboard">
            <div class="card total">
                <div class="card-label">總資產價值 (TWD)</div>
                <div class="card-value" id="total-net-value">NT$ 計算中...</div>
                <div class="card-sub" id="total-cost-sub">原始總成本: --</div>
            </div>
            <div class="card profit">
                <div class="card-label">即時總盈虧 (TWD)</div>
                <div class="card-value" id="total-profit">--</div>
                <div class="card-sub" id="total-rate-sub">--</div>
            </div>
            <div class="card fx">
                <div class="card-label">美金匯率 (USD/TWD)</div>
                <div class="card-value" id="fx-rate">--</div>
                <div class="card-sub">
                    <span class="status-indicator" id="api-status">
                        <i class="fa-solid fa-circle-check"></i> 匯率流正常
                    </span>
                </div>
            </div>
        </div>

        <div class="asset-section">
            <div class="section-header">
                <div class="section-title">
                    <i class="fa-solid fa-wallet" style="color: var(--accent);"></i> 即時持倉明細 
                </div>
                <span class="hint-text"><i class="fa-solid fa-pen-to-square"></i> 可直接在下方修改數量或手動同步真值</span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>資產項目</th>
                        <th>持有數量</th>
                        <th>買入成本</th>
                        <th>市場即時真實報價 (請參閱下方 TradingView 機制)</th>
                        <th>折合台幣現值</th>
                        <th>即時盈虧 (TWD)</th>
                        <th>報酬率</th>
                    </tr>
                </thead>
                <tbody id="asset-table-body">
                    </tbody>
            </table>
        </div>

        <div class="tradingview-section">
            <div class="section-header">
                <div class="section-title">
                    <i class="fa-solid fa-chart-line" style="color: #FF9800;"></i> TradingView 實時報價與高級技術圖表
                </div>
            </div>
            
            <div class="tv-grid">
                <div class="tv-container">
                    <div id="tradingview_advanced_chart" style="height: 100%; width: 100%;"></div>
                    </div>

                <div style="height: 500px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border);">
                    <div id="tradingview_market_overview" style="height: 100%; width: 100%;"></div>
                    </div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        // 1. 初始化高級 K 線圖（預設載入 ADAUSDT 交易所實時價格）
        new TradingView.widget({
            "width": "100%",
            "height": "100%",
            "symbol": "BINANCE:ADAUSDT",
            "interval": "D",
            "timezone": "Asia/Taipei",
            "theme": "dark",
            "style": "1",
            "locale": "zh_TW",
            "toolbar_bg": "#161B26",
            "enable_publishing": false,
            "hide_side_toolbar": false,
            "allow_symbol_change": true,
            "container_id": "tradingview_advanced_chart"
        });

        // 2. 初始化右側的專屬持倉市場報價單（直接解決台股與美股不給抓取的問題）
        // 這裡精準填入了你的台股 00403A、00955、美股 SPCX 以及 幣安 ADA
        document.write('<script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>\n' +
        '{\n' +
        '  "container_id": "tradingview_market_overview",\n' +
        '  "colorTheme": "dark",\n' +
        '  "dateRange": "12M",\n' +
        '  "showChart": false,\n' +
        '  "locale": "zh_TW",\n' +
        '  "width": "100%",\n' +
        '  "height": "100%",\n' +
        '  "largeChartUrl": "",\n' +
        '  "isTransparent": false,\n' +
        '  "showSymbolLogo": true,\n' +
        '  "showFloatingTooltip": false,\n' +
        '  "tabs": [\n' +
        '    {\n' +
        '      "title": "我的資產實時報價",\n' +
        '      "symbols": [\n' +
        '        {"s": "TWSE:00403A", "d": "台股 00403A"}, \n' +
        '        {"s": "TWSE:00955", "d": "台股 00955"}, \n' +
        '        {"s": "AMEX:SPCX", "d": "美股 SPCX"}, \n' +
        '        {"s": "BINANCE:ADAUSDT", "d": "ADA 幣安"} \n' +
        '      ],\n' +
        '      "originalTitle": "Indices"\n' +
        '    }\n' +
        '  ]\n' +
        '}\n' +
        '<\/script>');
    </script>

    <script>
        // 持倉核心數據結構
        const DEFAULT_PORTFOLIO = [
            { symbol: '00403A', type: '台股持倉', qty: 1607, cost: 9.83, currency: 'TWD', livePrice: 11.20 },
            { symbol: '00955', type: '台股持倉', qty: 1000, cost: 15.05, currency: 'TWD', livePrice: 15.12 },
            { symbol: 'SPCX', type: '美股長投', qty: 2, cost: 158.8, currency: 'USD', livePrice: 163.45 },
            { symbol: 'ADA', type: '加密貨幣', qty: 1611.24, cost: 0.189, currency: 'USDT', livePrice: 0.4215 }
        ];

        let portfolio = JSON.parse(localStorage.getItem('asset_portfolio_tv')) || DEFAULT_PORTFOLIO;
        let usdToTwd = 32.45;

        function formatCurrency(val) {
            return new Intl.NumberFormat('zh-TW', { maximumFractionDigits: 0 }).format(val);
        }

        function formatDecimal(val, digits = 2) {
            return new Intl.NumberFormat('zh-TW', { minimumFractionDigits: digits, maximumFractionDigits: digits }).format(val);
        }

        function updateAssetValue(index, field, value) {
            portfolio[index][field] = parseFloat(value) || 0;
            localStorage.setItem('asset_portfolio_tv', JSON.stringify(portfolio));
            calculateAndRender();
        }

        // 核心解方：呼叫不阻擋 CORS 的最新外部國際法幣匯率流與幣安 ADA 真實價格
        async function initAssetData() {
            const icon = document.getElementById('refresh-icon');
            if(icon) icon.classList.add('fa-spin');
            
            try {
                // 1. 抓取無 CORS 封鎖的真實即時匯率
                const fxRes = await fetch('https://open.er-api.com/v6/latest/USD');
                if (fxRes.ok) {
                    const fxData = await fxRes.json();
                    if (fxData.rates && fxData.rates.TWD) {
                        usdToTwd = fxData.rates.TWD;
                    }
                }

                // 2. 抓取幣安 ADAUSDT 實時價格
                const cryptoRes = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=ADAUSDT');
                if (cryptoRes.ok) {
                    const cryptoData = await cryptoRes.json();
                    portfolio[3].livePrice = parseFloat(cryptoData.price);
                }

                // 3. 針對台股與美股，由於純前端網頁受限於 Yahoo/富途的 CORS 安全政策，
                // 最精準的即時現價已完美呈現在下方的 TradingView 小工具中。
                // 如果你想同步更新上方看板數值，可直接在下方表格中點擊修改「市場真實報價」，數據會永久存檔。
                
            } catch (error) {
                console.error("即時匯率或加密流延遲，使用基準值進行安全結算", error);
            } finally {
                if(icon) setTimeout(() => icon.classList.remove('fa-spin'), 800);
                calculateAndRender();
            }
        }

        // 計算全資產台幣價值與回報率
        function calculateAndRender() {
            const tbody = document.getElementById('asset-table-body');
            if(!tbody) return;
            tbody.innerHTML = '';

            let totalCostTWD = 0;
            let totalValueTWD = 0;

            document.getElementById('fx-rate').innerText = formatDecimal(usdToTwd, 2);

            portfolio.forEach((asset, index) => {
                const fx = asset.currency === 'TWD' ? 1 : usdToTwd;

                const costTWD = asset.qty * asset.cost * fx;
                const valueTWD = asset.qty * asset.livePrice * fx;
                const profitTWD = valueTWD - costTWD;
                const rate = costTWD > 0 ? (profitTWD / costTWD) * 100 : 0;

                totalCostTWD += costTWD;
                totalValueTWD += valueTWD;

                const statusClass = profitTWD >= 0 ? 'up' : 'down';
                const sign = profitTWD >= 0 ? '+' : '';

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>
                        <div class="asset-name">
                            <span class="asset-symbol">${asset.symbol}</span>
                            <span class="asset-type">${asset.type} · <span class="badge ${asset.currency.toLowerCase()}">${asset.currency}</span></span>
                        </div>
                    </td>
                    <td>
                        <input type="number" class="editable-input" value="${asset.qty}" step="any" 
                            onchange="updateAssetValue(${index}, 'qty', this.value)">
                    </td>
                    <td>
                        <span style="font-size:0.85rem; color:var(--text-muted)">${asset.currency === 'TWD' ? 'NT$' : '$'}</span>
                        <input type="number" class="editable-input" value="${asset.cost}" step="any" style="width:85px"
                            onchange="updateAssetValue(${index}, 'cost', this.value)">
                    </td>
                    <td>
                        <span style="font-size:0.85rem; color:var(--text-muted)">${asset.currency === 'TWD' ? 'NT$' : '$'}</span>
                        <input type="number" class="editable-input" value="${asset.livePrice}" step="any" style="width:85px; color: #FFF; border-bottom: 1px dashed var(--border);"
                            onchange="updateAssetValue(${index}, 'livePrice', this.value)">
                    </td>
                    <td class="neutral">NT$ ${formatCurrency(valueTWD)}</td>
                    <td class="${statusClass}">${sign}NT$ ${formatCurrency(profitTWD)}</td>
                    <td class="${statusClass}">${sign}${formatDecimal(rate)}%</td>
                `;
                tbody.appendChild(row);
            });

            const totalProfitTWD = totalValueTWD - totalCostTWD;
            const totalRate = totalCostTWD > 0 ? (totalProfitTWD / totalCostTWD) * 100 : 0;
            const totalSign = totalProfitTWD >= 0 ? '+' : '';
            const totalStatus = totalProfitTWD >= 0 ? 'up' : 'down';

            document.getElementById('total-net-value').innerText = `NT$ ${formatCurrency(totalValueTWD)}`;
            document.getElementById('total-cost-sub').innerText = `原始總成本: NT$ ${formatCurrency(totalCostTWD)}`;
            
            const profitDashboard = document.getElementById('total-profit');
            profitDashboard.innerText = `${totalSign}NT$ ${formatCurrency(totalProfitTWD)}`;
            profitDashboard.className = `card-value ${totalStatus}`;

            const rateSub = document.getElementById('total-rate-sub');
            rateSub.innerHTML = `<span class="${totalStatus}">${totalSign}${formatDecimal(totalRate)}% 總投報率</span>`;
        }

        function exportData() {
            const dataStr = JSON.stringify(portfolio, null, 2);
            const blob = new Blob([dataStr], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `AssetStream_TradingView_Backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        window.onload = () => {
            initAssetData();
        };
    </script>
</body>
</html>
